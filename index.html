<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bar Stock Cut Optimizer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeede9;
    --text-primary: #1a1a18;
    --text-secondary: #6b6a65;
    --text-tertiary: #9e9d97;
    --border-light: rgba(0,0,0,0.12);
    --border-mid: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
    --blue: #185FA5;
    --blue-dark: #0C447C;
    --danger-bg: #FCEBEB;
    --danger-text: #A32D2D;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0efeb;
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  h1 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 0.25rem;
    color: var(--text-primary);
  }
  .subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
  }
  .container { max-width: 860px; margin: 0 auto; }
  .card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 0.75rem;
  }
  .row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 13px; color: var(--text-secondary); }
  .field input, .field select {
    height: 36px;
    padding: 0 10px;
    border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md);
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 14px;
    width: 140px;
  }
  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(24,95,165,0.12);
  }
  .pieces-table { width: 100%; border-collapse: collapse; }
  .pieces-table th {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    text-align: left;
    padding: 6px 10px;
    border-bottom: 0.5px solid var(--border-light);
  }
  .pieces-table td { padding: 5px 10px; }
  .pieces-table td input {
    height: 32px;
    padding: 0 8px;
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-md);
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-size: 14px;
    width: 100px;
  }
  .pieces-table td input:focus {
    outline: none;
    border-color: var(--blue);
    background: var(--bg-primary);
  }
  .btn-add {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    background: none;
    border: 0.5px dashed var(--border-mid);
    border-radius: var(--radius-md);
    padding: 6px 14px;
    cursor: pointer;
    margin-top: 10px;
    font-family: inherit;
  }
  .btn-add:hover { background: var(--bg-secondary); color: var(--text-primary); }
  .btn-remove {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-tertiary);
    font-size: 18px;
    padding: 2px 6px;
    border-radius: 4px;
    line-height: 1;
  }
  .btn-remove:hover { color: var(--danger-text); background: var(--danger-bg); }
  .btn-calc {
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    padding: 10px 28px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .btn-calc:hover { background: var(--blue-dark); }
  .btn-print {
    background: none;
    border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md);
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    color: var(--text-primary);
    margin-left: 8px;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .btn-print:hover { background: var(--bg-secondary); }
  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 1rem;
  }
  .metric {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 0.9rem 1rem;
  }
  .metric-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .metric-value { font-size: 24px; font-weight: 500; color: var(--text-primary); }
  .metric-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
  .bar-chart-wrap { overflow-x: auto; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    min-width: 480px;
  }
  .bar-label {
    font-size: 12px;
    color: var(--text-secondary);
    width: 52px;
    flex-shrink: 0;
    text-align: right;
  }
  .bar-track {
    flex: 1;
    height: 36px;
    background: var(--bg-secondary);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    border: 0.5px solid var(--border-light);
  }
  .bar-drop {
    font-size: 11px;
    color: var(--text-tertiary);
    width: 70px;
    flex-shrink: 0;
  }
  .seg {
    height: 100%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 500;
    position: absolute;
    top: 0;
    overflow: hidden;
    border-right: 2px solid rgba(255,255,255,0.6);
  }
  .seg:last-child { border-right: none; }
  .seg-label { white-space: nowrap; overflow: hidden; padding: 0 3px; pointer-events: none; }
  .legend-wrap { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 1rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .kerf-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-secondary);
    padding-bottom: 2px;
  }
  .kerf-row input {
    width: 80px;
    height: 34px;
    border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md);
    padding: 0 8px;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
  }
  .kerf-row input:focus { outline: none; border-color: var(--blue); }
  .error {
    color: var(--danger-text);
    font-size: 13px;
    padding: 8px 12px;
    background: var(--danger-bg);
    border-radius: var(--radius-md);
    margin-top: 10px;
  }
  .divider { border: none; border-top: 0.5px solid var(--border-light); margin: 1rem 0; }
  .cut-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .cut-table th {
    text-align: left;
    padding: 6px 10px;
    font-weight: 500;
    color: var(--text-secondary);
    border-bottom: 0.5px solid var(--border-light);
    font-size: 12px;
  }
  .cut-table td { padding: 8px 10px; border-bottom: 0.5px solid var(--border-light); }
  .cut-table tr:last-child td { border-bottom: none; }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    margin: 2px;
    color: #fff;
  }
  @media print {
    body { background: #fff; padding: 0.5rem; }
    .no-print { display: none !important; }
    .card { border: 1px solid #ccc; margin-bottom: 0.75rem; }
    .seg { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    .bar-track { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    .legend-dot { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    .tag { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    .metric { print-color-adjust: exact; -webkit-print-color-adjust: exact; background: #f5f5f3 !important; }
  }
</style>

<script>
window.addEventListener('load', function(){
  const img = document.getElementById('app-logo');
  if (!img) return;
  const c = document.createElement('canvas');
  c.width = 128; c.height = 128;
  const ctx = c.getContext('2d');
  const r = 22;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(128-r,0);
  ctx.quadraticCurveTo(128,0,128,r);
  ctx.lineTo(128,128-r); ctx.quadraticCurveTo(128,128,128-r,128);
  ctx.lineTo(r,128); ctx.quadraticCurveTo(0,128,0,128-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();
  ctx.clip();
  ctx.drawImage(img, 0, 0, 128, 128);
  const dataURL = c.toDataURL('image/png');
  const link = document.createElement('link');
  link.rel = 'icon'; link.type = 'image/png';
  link.href = dataURL;
  document.head.appendChild(link);
  const touch = document.createElement('link');
  touch.rel = 'apple-touch-icon';
  touch.href = dataURL;
  document.head.appendChild(touch);
});
</script>

<script>
const COLORS = ['#185FA5','#1D9E75','#BA7517','#993556','#534AB7','#3B6D11','#854F0B','#993C1D','#0F6E56','#3C3489'];

let pieces = [{len:'17', qty:'14'}, {len:'32', qty:'15'}];
let unitMode = 'in';

function renderRows() {
  const body = document.getElementById('piecesBody');
  body.innerHTML = '';
  pieces.forEach((p, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-size:13px;color:var(--text-secondary);">${i + 1}</td>
      <td><input type="number" value="${p.len}" min="0.01" step="0.01" placeholder="length"
        oninput="pieces[${i}].len=this.value" /></td>
      <td><input type="number" value="${p.qty}" min="1" step="1" placeholder="qty"
        oninput="pieces[${i}].qty=this.value" style="width:80px;" /></td>
      <td><button class="btn-remove" onclick="removeRow(${i})" aria-label="Remove row ${i+1}">×</button></td>`;
    body.appendChild(tr);
  });
}

function addRow() { pieces.push({len: '', qty: '1'}); renderRows(); }
function removeRow(i) { pieces.splice(i, 1); renderRows(); }

function onBarSelect() {
  const v = document.getElementById('barLengthSelect').value;
  document.getElementById('customField').style.display = v === 'custom' ? '' : 'none';
}

function onUnitChange() {
  unitMode = document.getElementById('unitSelect').value;
  document.getElementById('kerfUnit').textContent = unitMode === 'mm' ? 'mm' : unitMode === 'ft' ? 'ft' : 'in';
}

function getBarInches() {
  const sel = document.getElementById('barLengthSelect').value;
  let raw = sel === 'custom'
    ? parseFloat(document.getElementById('customLength').value)
    : parseFloat(sel);
  if (unitMode === 'ft') raw = raw * 12;
  else if (unitMode === 'mm') raw = raw / 25.4;
  return raw;
}

function getKerfInches() {
  let k = parseFloat(document.getElementById('kerfInput').value) || 0;
  if (unitMode === 'ft') k = k * 12;
  else if (unitMode === 'mm') k = k / 25.4;
  return k;
}

function toInches(v) {
  if (unitMode === 'ft') return v * 12;
  if (unitMode === 'mm') return v / 25.4;
  return v;
}

function fmtLen(inches) {
  if (unitMode === 'ft') return (inches / 12).toFixed(3).replace(/\.?0+$/, '') + ' ft';
  if (unitMode === 'mm') return Math.round(inches * 25.4) + ' mm';
  return inches % 1 === 0 ? inches + '"' : inches.toFixed(4).replace(/\.?0+$/, '') + '"';
}

function firstFitDecreasing(barLen, kerf, demand) {
  // Build flat item list sorted largest first
  const items = [];
  demand.forEach((d, ci) => {
    for (let q = 0; q < d.qty; q++) items.push({len: d.len, ci});
  });
  items.sort((a, b) => b.len - a.len);

  // Helper: remaining space in a bar
  function remaining(bar) {
    const used = bar.segs.reduce((s, s2) => s + s2.len, 0)
      + Math.max(0, bar.segs.length - 1) * kerf;
    return barLen - used;
  }

  // FFD to get an upper bound on bar count
  function runFFD(itms) {
    const bars = [];
    itms.forEach(item => {
      let placed = false;
      for (let b = 0; b < bars.length; b++) {
        const space = remaining(bars[b]);
        const needed = (bars[b].segs.length > 0 ? kerf : 0) + item.len;
        if (needed <= space + 1e-9) {
          bars[b].segs.push({len: item.len, ci: item.ci});
          placed = true; break;
        }
      }
      if (!placed) bars.push({segs: [{len: item.len, ci: item.ci}]});
    });
    return bars;
  }

  // For small problems (≤40 items) run branch-and-bound for exact solution
  if (items.length <= 40) {
    let bestBars = runFFD(items);
    let bestCount = bestBars.length;

    function bnb(idx, bars) {
      if (bars.length >= bestCount) return; // prune
      if (idx === items.length) {
        bestCount = bars.length;
        bestBars = bars.map(b => ({segs: [...b.segs]}));
        return;
      }
      const item = items[idx];
      // Try placing in each existing bar (only unique remainders to avoid duplicates)
      const seen = new Set();
      for (let b = 0; b < bars.length; b++) {
        const space = remaining(bars[b]);
        const needed = (bars[b].segs.length > 0 ? kerf : 0) + item.len;
        const key = Math.round(space * 1000);
        if (needed <= space + 1e-9 && !seen.has(key)) {
          seen.add(key);
          bars[b].segs.push({len: item.len, ci: item.ci});
          bnb(idx + 1, bars);
          bars[b].segs.pop();
        }
      }
      // Try opening a new bar
      if (bars.length + 1 < bestCount) {
        bars.push({segs: [{len: item.len, ci: item.ci}]});
        bnb(idx + 1, bars);
        bars.pop();
      }
    }

    bnb(0, []);
    return bestBars;
  }

  // Fallback to FFD for large problems
  const bars = runFFD(items);
  return bars;
}

function calculate() {
  document.getElementById('errorMsg').innerHTML = '';
  const barIn = getBarInches();
  const kerf = getKerfInches();

  if (!barIn || barIn <= 0) {
    document.getElementById('errorMsg').innerHTML = '<div class="error">Please enter a valid bar length.</div>';
    return;
  }

  const demand = [];
  for (let i = 0; i < pieces.length; i++) {
    const len = toInches(parseFloat(pieces[i].len));
    const qty = parseInt(pieces[i].qty);
    if (!len || len <= 0 || !qty || qty <= 0) {
      document.getElementById('errorMsg').innerHTML = '<div class="error">All piece sizes and quantities must be positive numbers.</div>';
      return;
    }
    if (len > barIn + 1e-9) {
      document.getElementById('errorMsg').innerHTML = `<div class="error">Piece length ${fmtLen(len)} exceeds bar length (${fmtLen(barIn)}).</div>`;
      return;
    }
    demand.push({len, qty, label: pieces[i].len + (unitMode === 'in' ? '"' : unitMode === 'ft' ? ' ft' : ' mm'), ci: i});
  }

  const bars = firstFitDecreasing(barIn, kerf, demand);

  const totalDrop = bars.reduce((s, b) => {
    const used = b.segs.reduce((ss, sg) => ss + sg.len, 0) + Math.max(0, b.segs.length - 1) * kerf;
    return s + (barIn - used);
  }, 0);
  const totalMat = bars.length * barIn;
  const efficiency = ((totalMat - totalDrop) / totalMat * 100).toFixed(1);

  renderMetrics(bars.length, totalDrop, efficiency, barIn, kerf);
  renderChart(bars, barIn, kerf, demand);
  renderCutList(bars, barIn, demand, kerf);
  document.getElementById('results').style.display = '';
  document.getElementById('results').scrollIntoView({behavior: 'smooth', block: 'start'});
}

function renderMetrics(numBars, totalDrop, eff, barIn, kerf) {
  document.getElementById('metricsArea').innerHTML = `
    <div class="metric">
      <div class="metric-label">Bars needed</div>
      <div class="metric-value">${numBars}</div>
      <div class="metric-sub">${fmtLen(barIn)} each</div>
    </div>
    <div class="metric">
      <div class="metric-label">Material efficiency</div>
      <div class="metric-value">${eff}%</div>
      <div class="metric-sub">of total material used</div>
    </div>
    <div class="metric">
      <div class="metric-label">Total drop / waste</div>
      <div class="metric-value">${fmtLen(Math.round(totalDrop * 100) / 100)}</div>
      <div class="metric-sub">across all bars</div>
    </div>
    <div class="metric">
      <div class="metric-label">Kerf per cut</div>
      <div class="metric-value">${fmtLen(kerf)}</div>
      <div class="metric-sub">saw blade width</div>
    </div>`;
}

function renderChart(bars, barIn, kerf, demand) {
  const legend = document.getElementById('legendArea');
  legend.innerHTML = '';
  demand.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'legend-item';
    el.innerHTML = `<span class="legend-dot" style="background:${COLORS[i % COLORS.length]};"></span>
      <span>${d.label} &times; ${d.qty}</span>`;
    legend.appendChild(el);
  });
  const dropEl = document.createElement('div');
  dropEl.className = 'legend-item';
  dropEl.innerHTML = `<span class="legend-dot" style="background:#e5e4e0;border:0.5px solid #bbb;"></span><span>Drop / waste</span>`;
  legend.appendChild(dropEl);

  const area = document.getElementById('barChartArea');
  area.innerHTML = '';

  bars.forEach((bar, bi) => {
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `<div class="bar-label">Bar ${bi + 1}</div>`;
    const track = document.createElement('div');
    track.className = 'bar-track';
    let cursor = 0;

    bar.segs.forEach((seg, si) => {
      if (si > 0 && kerf > 0) {
        const kw = (kerf / barIn * 100);
        const kDiv = document.createElement('div');
        kDiv.className = 'seg';
        kDiv.style.cssText = `left:${cursor / barIn * 100}%;width:${kw}%;background:#888;opacity:0.35;`;
        track.appendChild(kDiv);
        cursor += kerf;
      }
      const pct = seg.len / barIn * 100;
      const col = COLORS[seg.ci % COLORS.length];
      const sDiv = document.createElement('div');
      sDiv.className = 'seg';
      sDiv.style.cssText = `left:${cursor / barIn * 100}%;width:${pct}%;background:${col};color:#fff;`;
      if (pct > 5) sDiv.innerHTML = `<span class="seg-label">${demand[seg.ci].label}</span>`;
      track.appendChild(sDiv);
      cursor += seg.len;
    });

    const drop = barIn - cursor;
    if (drop > 0.01) {
      const dropPct = drop / barIn * 100;
      const dDiv = document.createElement('div');
      dDiv.className = 'seg';
      dDiv.style.cssText = `left:${cursor / barIn * 100}%;width:${dropPct}%;background:#e5e4e0;border-left:2px dashed #bbb;`;
      if (dropPct > 4) {
        dDiv.innerHTML = `<span class="seg-label" style="color:#888;font-size:10px;">${fmtLen(Math.round(drop * 1000) / 1000)}</span>`;
      }
      track.appendChild(dDiv);
    }

    row.appendChild(track);
    const dropDiv = document.createElement('div');
    dropDiv.className = 'bar-drop';
    dropDiv.textContent = drop > 0.01 ? '↳ ' + fmtLen(Math.round(drop * 100) / 100) + ' drop' : '';
    row.appendChild(dropDiv);
    area.appendChild(row);
  });
}

function renderCutList(bars, barIn, demand, kerf) {
  let html = '<div class="section-label">Cut instructions — for shop floor</div>';
  html += '<table class="cut-table"><thead><tr>';
  html += '<th>Bar #</th><th>Pieces to cut</th><th># of cuts</th><th>Drop</th>';
  html += '</tr></thead><tbody>';

  bars.forEach((bar, bi) => {
    const groups = {};
    bar.segs.forEach(s => {
      const k = s.ci;
      groups[k] = (groups[k] || 0) + 1;
    });
    const tags = Object.entries(groups).map(([ci, count]) => {
      const col = COLORS[parseInt(ci) % COLORS.length];
      return `<span class="tag" style="background:${col};">${count} × ${demand[parseInt(ci)].label}</span>`;
    }).join(' ');
    const usedLen = bar.segs.reduce((s, s2) => s + s2.len, 0) + Math.max(0, bar.segs.length - 1) * kerf;
    const drop = Math.round((barIn - usedLen) * 1000) / 1000;
    const numCuts = bar.segs.length;
    html += `<tr>
      <td style="font-weight:500;">Bar ${bi + 1}</td>
      <td>${tags}</td>
      <td>${numCuts} cut${numCuts !== 1 ? 's' : ''}</td>
      <td style="color:var(--text-tertiary);">${drop > 0.01 ? fmtLen(drop) : '—'}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('cutListArea').innerHTML = html;
}

renderRows();
onBarSelect();
</script>
